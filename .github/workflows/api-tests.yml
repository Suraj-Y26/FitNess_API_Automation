name: FitNesse + Python API Test Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  run-api-tests:
    name: Run API Acceptance Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout codebase
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java Environment (FitNesse requires Java 8+)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Set up Python Environment
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Speeds up dependency downloads

      # 4. Install requirements
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 5. Execute Test Suite Natively
      # Runs the suite headlessly using the FitNesse JAR.
      # Sets PYTHONPATH to '.' so Python can find your fixtures on Linux CI.
      - name: Run Test Suite
        env:
          PYTHONPATH: .
        run: |
          java -jar fitnesse-standalone.jar -c "UserTests?suite&format=text"
