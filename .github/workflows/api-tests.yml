name: FitNesse + Python API Test Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  run-api-tests:
    name: Run API Acceptance Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout codebase
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java Environment (FitNesse requires Java 8+)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven' # Speeds up subsequent runs

      # 3. Set up Python Environment
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Speeds up dependency downloads

      # 4. Install requirements
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 5. Execute Test Suite & Auto-Generate Report
      # Reads REQRES_API_KEY from GitHub Repository Secrets.
      # If not set, it will gracefully fallback to the embedded free key!
      - name: Run Test Suite
        env:
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
        run: |
          python run_tests.py

      # 6. Upload HTML Report as an Action Artifact
      # You can click and download the beautiful standalone dashboard directly from GitHub!
      - name: Upload HTML Test Report
        if: always() # Guarantees report upload even if tests fail!
        uses: actions/upload-artifact@v4
        with:
          name: fitnesse-api-test-report
          path: FitNesseRoot/files/reports/suite_report.html
          retention-days: 14 # Keeps report for 14 days before automatic cleanup
